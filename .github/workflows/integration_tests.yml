name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * *" # Daily at 2 AM UTC (nightly)

env:
  CARGO_TERM_COLOR: always

jobs:
  integration-tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Generous timeout for test completion

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "integration-tests"
          cache-directories: |
            ~/.cargo/registry
            ~/.cargo/git
            target

      - name: Setup tx3 toolchain
        uses: tx3-lang/actions/setup@v1

      - name: Run error case tests
        working-directory: ./sdk
        env:
          TRP_ENDPOINT_PREPROD: ${{ secrets.TRP_ENDPOINT_PREPROD }}
          TRP_API_KEY_PREPROD: ${{ secrets.TRP_API_KEY_PREPROD }}
        run: cargo test --test error_cases

      - name: Run happy path lifecycle test
        working-directory: ./sdk
        env:
          TRP_ENDPOINT_PREPROD: ${{ secrets.TRP_ENDPOINT_PREPROD }}
          TEST_PARTY_A_ADDRESS: ${{ secrets.TEST_PARTY_A_ADDRESS }}
          TEST_PARTY_A_MNEMONIC: ${{ secrets.TEST_PARTY_A_MNEMONIC }}
          TRP_API_KEY_PREPROD: ${{ secrets.TRP_API_KEY_PREPROD }}
        run: cargo test --test happy_path -- --nocapture

      - name: Run tx3c codegen test
        working-directory: ./sdk
        run: cargo test --test codegen
